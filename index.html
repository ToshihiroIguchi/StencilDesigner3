<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StencilDesigner3</title>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header id="header">
  <span class="app-title">StencilDesigner3</span>
  <div class="separator"></div>

  <!-- Undo / Redo -->
  <button id="btn-undo" class="hdr-btn" title="Undo (Ctrl+Z)" disabled>
    <svg class="icon" viewBox="0 0 24 24"><path d="M3 7h11a4 4 0 0 1 0 8H7"/><polyline points="7 3 3 7 7 11"/></svg>
    Undo
  </button>
  <button id="btn-redo" class="hdr-btn" title="Redo (Ctrl+Y)" disabled>
    <svg class="icon" viewBox="0 0 24 24"><path d="M21 7H10a4 4 0 0 0 0 8h7"/><polyline points="17 3 21 7 17 11"/></svg>
    Redo
  </button>

  <div class="separator"></div>

  <!-- File ops -->
  <button id="btn-import" class="hdr-btn" title="Import DXF">
    <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Import
  </button>
  <button id="btn-export" class="hdr-btn" title="Export DXF">
    <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Export
  </button>
  <input id="dxf-file-input" type="file" accept=".dxf" style="display:none" />

  <div class="separator"></div>

  <!-- Snap / Theme / Clear -->
  <button id="btn-snap" class="hdr-btn active" title="Toggle snap">
    <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    Snap
  </button>
  <button id="btn-theme" class="hdr-btn" title="Toggle light/dark theme">
    <svg class="icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    Theme
  </button>
  <button id="btn-clear" class="hdr-btn" title="Clear all (hard reset)" style="color:var(--danger)">
    <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
    Clear
  </button>
</header>

<!-- ── Main ─────────────────────────────────────────────────────────────────── -->
<main id="main">

  <!-- ── Left toolbar ──────────────────────────────────────────────────────── -->
  <nav id="toolbar">

    <!-- Draw tools -->
    <div class="tool-group">
      <button class="tool-btn" data-tool="select" title="Select (V)">
        <svg class="icon" viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg>
      </button>
      <span class="tool-label">Select</span>

      <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
      </button>
      <span class="tool-label">Rect</span>

      <button class="tool-btn" data-tool="circle" title="Circle (C)">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
      </button>
      <span class="tool-label">Circle</span>
    </div>

    <!-- Edit actions -->
    <div class="tool-group">
      <button class="tool-btn" id="btn-delete" title="Delete selected (Del)">
        <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
      <span class="tool-label">Delete</span>

      <button class="tool-btn" id="btn-copy-btn" title="Copy selected">
        <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <span class="tool-label">Copy</span>

      <button class="tool-btn" id="btn-array" title="Array copy">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <span class="tool-label">Array</span>
    </div>

    <!-- Boolean ops -->
    <div class="tool-group">
      <button class="tool-btn" id="btn-union" title="Union (merge selected)">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="12" r="6"/><circle cx="15" cy="12" r="6"/></svg>
      </button>
      <span class="tool-label">Union</span>

      <button class="tool-btn" id="btn-difference" title="Difference (subtract 2nd from 1st)">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="12" r="6"/><line x1="14" y1="8" x2="20" y2="16"/><line x1="20" y1="8" x2="14" y2="16"/></svg>
      </button>
      <span class="tool-label">Diff</span>
    </div>

  </nav>

  <!-- ── Canvas ─────────────────────────────────────────────────────────────── -->
  <div id="canvas-container">
    <canvas id="main-canvas"></canvas>
  </div>

  <!-- ── Right panel ────────────────────────────────────────────────────────── -->
  <aside id="right-panel">
    <div class="panel-section">
      <div class="panel-title">Selection</div>
      <div id="selection-info"><p class="muted">No selection</p></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">DRC</div>
      <div id="drc-list"><p class="muted">No errors</p></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Layers</div>
      <p style="color:var(--fg2);font-size:11px;">Single layer (0)</p>
    </div>
  </aside>

</main>

<!-- ── Footer ───────────────────────────────────────────────────────────────── -->
<footer id="footer">
  <span class="footer-item"><span class="footer-key">X:</span><span class="footer-val" id="footer-cx">0</span></span>
  <span class="footer-item"><span class="footer-key">Y:</span><span class="footer-val" id="footer-cy">0</span></span>
  <span class="footer-item"><span class="footer-key">W:</span><span class="footer-val" id="footer-w">—</span></span>
  <span class="footer-item"><span class="footer-key">H:</span><span class="footer-val" id="footer-h">—</span></span>
  <span class="footer-item"><span class="footer-key">Area:</span><span class="footer-val" id="footer-area">—</span></span>
  <span class="footer-item"><span class="footer-key">Grid:</span><span class="footer-val" id="footer-grid">1000µm</span></span>
  <span class="footer-item"><span class="footer-key">Snap:</span><span class="footer-val" id="footer-snap">ON</span></span>
  <span class="footer-item"><span class="footer-key">Zoom:</span><span class="footer-val" id="footer-zoom">50%</span></span>
</footer>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
